<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Kirtan Soni</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/style.css">
  <script>(function(){try{var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <style>
    .nf-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    .nf {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .nf .code {
      font: 600 26px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.02em;
    }
    .nf .rule {
      width: 1px;
      height: 44px;
      background: var(--rule);
    }
    .nf .msg {
      font-size: 15px;
      color: var(--muted);
      margin: 0;
    }
    .nf-home {
      font-size: 14px;
      color: var(--muted);
    }
    .nf-home:hover { color: var(--link); }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <div class="nf">
      <span class="code">404</span>
      <span class="rule"></span>
      <p class="msg">This page could not be found.</p>
    </div>
    <a class="nf-home" href="/">← kirtansoni.com</a>
  </div>
</body>
</html>
